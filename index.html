<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的日记</title>
    <meta name="theme-color" content="#5B8DB8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="我的日记">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- SVG Icon Definitions -->
    <svg style="display: none;">
        <defs>
            <!-- Book/Diary Icon -->
            <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </symbol>
            <!-- Export/Upload Icon -->
            <symbol id="icon-export" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </symbol>
            <!-- Import/Download Icon -->
            <symbol id="icon-import" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </symbol>
            <!-- Settings Icon -->
            <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </symbol>
            <!-- Search Icon -->
            <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </symbol>
            <!-- Edit/Pen Icon -->
            <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </symbol>
            <!-- Trash/Delete Icon -->
            <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </symbol>
            <!-- Pin Icon (outline) -->
            <symbol id="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="17" x2="12" y2="22"></line>
                <path d="M5 17h14v-5.6a2 2 0 0 0-.6-1.4l-2.8-2.8a2 2 0 0 1-.6-1.4V4H9v2.8a2 2 0 0 1-.6 1.4L5.6 11.6a2 2 0 0 0-.6 1.4V17z"></path>
            </symbol>
            <!-- Pin Icon (filled) -->
            <symbol id="icon-pinned" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M16 12V4h1V2H7v2h1v8l-3 3v2h5.2v6h1.6v-6H19v-2l-3-3z"></path>
            </symbol>
            <!-- Open Book Icon -->
            <symbol id="icon-book-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </symbol>
            <!-- Document/Note Icon -->
            <symbol id="icon-document" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </symbol>
            <!-- Camera/Image Icon -->
            <symbol id="icon-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </symbol>
            <!-- Save/Backup Icon -->
            <symbol id="icon-save" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
            </symbol>
            <!-- Calendar Icon -->
            <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </symbol>
            <!-- Warning Icon -->
            <symbol id="icon-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </symbol>
            <!-- Database/Storage Icon -->
            <symbol id="icon-database" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </symbol>
            <!-- X/Close Icon -->
            <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </symbol>
        </defs>
    </svg>
</head>
<body>
    <div class="container">
        <!-- 顶部栏 -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon"><use href="#icon-book-open"></use></svg>
                <span>我的日记</span>
            </div>
            <div class="header-actions">
                <button id="exportBtn" class="btn-header">
                    <svg class="btn-icon"><use href="#icon-export"></use></svg>
                    <span>导出</span>
                </button>
                <button id="importBtn" class="btn-header">
                    <svg class="btn-icon"><use href="#icon-import"></use></svg>
                    <span>导入</span>
                </button>
                <button id="settingsBtn" class="btn-header">
                    <svg class="btn-icon"><use href="#icon-settings"></use></svg>
                    <span>设置</span>
                </button>
            </div>
        </header>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <div class="search-input-wrapper">
                <svg class="search-icon"><use href="#icon-search"></use></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索日记内容...">
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧：日历 -->
            <aside class="sidebar">
                <div class="calendar-card">
                    <div class="calendar-header">
                        <div class="calendar-title-wrapper">
                            <select class="year-select" id="yearSelect"></select>
                            <span class="calendar-separator">年</span>
                            <select class="month-select" id="monthSelect">
                                <option value="0">1月</option>
                                <option value="1">2月</option>
                                <option value="2">3月</option>
                                <option value="3">4月</option>
                                <option value="4">5月</option>
                                <option value="5">6月</option>
                                <option value="6">7月</option>
                                <option value="7">8月</option>
                                <option value="8">9月</option>
                                <option value="9">10月</option>
                                <option value="10">11月</option>
                                <option value="11">12月</option>
                            </select>
                        </div>
                        <div class="calendar-nav">
                            <button class="nav-btn" id="prevMonth">‹</button>
                            <button class="nav-btn" id="todayBtn">今天</button>
                            <button class="nav-btn" id="nextMonth">›</button>
                        </div>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="weekday">日</div>
                        <div class="weekday">一</div>
                        <div class="weekday">二</div>
                        <div class="weekday">三</div>
                        <div class="weekday">四</div>
                        <div class="weekday">五</div>
                        <div class="weekday">六</div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- 日历格子由 JS 生成 -->
                    </div>
                    <div class="calendar-legend">
                        <div class="legend-item">
                            <span class="legend-dot has-entry"></span>
                            <span>有日记</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot today"></span>
                            <span>今天</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot selected"></span>
                            <span>选中</span>
                        </div>
                    </div>
                    <button id="clearFilterBtn" class="btn-secondary btn-small" style="display: none;">
                        显示全部日记
                    </button>
                </div>
            </aside>

            <!-- 右侧：日记列表 -->
            <section class="content">
                <div class="content-header">
                    <h2 class="content-title">
                        <svg class="title-icon"><use href="#icon-book-open"></use></svg>
                        <span>我的日记</span>
                    </h2>
                    <span id="entryCount" class="entry-count"></span>
                    <button id="writeBtn" class="btn-primary">
                        <svg class="btn-icon"><use href="#icon-edit"></use></svg>
                        <span>写日记</span>
                    </button>
                </div>

                <div id="entryList" class="entry-list">
                    <!-- 日记列表将在这里动态生成 -->
                </div>

                <!-- 空状态 -->
                <div id="emptyState" class="empty-state">
                    <svg class="empty-icon"><use href="#icon-document"></use></svg>
                    <p class="empty-text">还没有日记，写下你的第一篇吧！</p>
                </div>
            </section>
        </main>
    </div>

    <!-- 写日记弹窗 -->
    <div id="writeModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">
                    <svg class="title-icon"><use href="#icon-edit"></use></svg>
                    <span>写日记</span>
                </h3>
                <button class="modal-close" id="closeModal" aria-label="关闭">
                    <svg class="close-icon"><use href="#icon-close"></use></svg>
                </button>
            </div>
            <form id="diaryForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">日期</label>
                        <input type="date" id="diaryDate" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">标题</label>
                        <input type="text" id="diaryTitle" class="form-input" placeholder="给今天取个标题..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">内容</label>
                        <textarea id="diaryContent" class="form-textarea" placeholder="记录下今天发生的事情..." rows="5" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">图片（最多5张）</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            <div class="upload-placeholder">
                                <svg class="upload-icon"><use href="#icon-camera"></use></svg>
                                <div class="upload-text">点击或拖拽上传图片</div>
                                <div class="upload-hint">支持 JPG、PNG 格式</div>
                            </div>
                            <input type="file" id="imageInput" class="image-input" accept="image/*" multiple>
                        </div>
                        <div class="image-preview-list" id="imagePreviewList"></div>
                    </div>
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="isPinned">
                            <span>置顶这篇日记</span>
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn-primary">保存日记</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div id="importModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">
                    <svg class="title-icon"><use href="#icon-import"></use></svg>
                    <span>导入日记</span>
                </h3>
                <button class="modal-close" id="closeImportModal" aria-label="关闭">
                    <svg class="close-icon"><use href="#icon-close"></use></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">选择备份文件</label>
                    <input type="file" id="importFile" class="form-input" accept=".json">
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="mergeImport" checked>
                        <span>合并到现有日记（不勾选则覆盖）</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="cancelImportBtn">取消</button>
                <button type="button" class="btn-primary" id="confirmImportBtn">导入</button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">
                    <svg class="title-icon"><use href="#icon-settings"></use></svg>
                    <span>设置</span>
                </h3>
                <button class="modal-close" id="closeSettingsModal" aria-label="关闭">
                    <svg class="close-icon"><use href="#icon-close"></use></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h4 class="settings-title">
                        <svg class="section-icon"><use href="#icon-calendar"></use></svg>
                        <span>备份提醒</span>
                    </h4>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="enableReminder" checked>
                            <span>开启定期备份提醒</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">提醒间隔（天）</label>
                        <select id="reminderInterval" class="form-input">
                            <option value="3">3天</option>
                            <option value="7" selected>7天</option>
                            <option value="14">14天</option>
                            <option value="30">30天</option>
                        </select>
                    </div>
                    <div class="settings-info" id="lastBackupInfo">
                        上次备份：从未备份
                    </div>
                </div>

                <div class="settings-section">
                    <h4 class="settings-title">
                        <svg class="section-icon"><use href="#icon-database"></use></svg>
                        <span>数据管理</span>
                    </h4>
                    <div class="settings-stats">
                        <div class="stat-item">
                            <span class="stat-label">日记数量：</span>
                            <span class="stat-value" id="statsEntryCount">0 篇</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">存储使用：</span>
                            <span class="stat-value" id="statsStorageSize">计算中...</span>
                        </div>
                    </div>
                </div>

                <div class="settings-section">
                    <h4 class="settings-title">
                        <svg class="section-icon warning"><use href="#icon-warning"></use></svg>
                        <span>危险操作</span>
                    </h4>
                    <button id="clearAllBtn" class="btn-danger">
                        <svg class="btn-icon"><use href="#icon-trash"></use></svg>
                        <span>清空所有数据</span>
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" id="cancelSettingsBtn">取消</button>
                <button type="button" class="btn-primary" id="saveSettingsBtn">保存设置</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="toast"></div>

    <!-- PWA Service Worker 注册 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js')
                    .then(function(registration) {
                        console.log('SW registered:', registration.scope);
                    })
                    .catch(function(error) {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>

    <script src="js/db.js"></script>
    <script src="js/image-utils.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
